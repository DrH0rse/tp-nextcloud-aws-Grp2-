name: Terraform Plan

on:
  pull_request:
    branches:
      - main
    paths:
      - "envs/dev/**"
      - "modules/**"

permissions:
  id-token: write   # Requis pour OIDC AWS
  contents: read
  pull-requests: write  # Pour commenter la PR

jobs:
  terraform-plan:
    name: Terraform Security & Plan
    runs-on: ubuntu-latest
    environment: dev

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Setup Terraform ───────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.10"

      # ── tfsec ─────────────────────────────────────────────────────────────
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: .
          soft_fail: false
          format: lovely
          additional_args: >-
            --minimum-severity HIGH
            --exclude-downloaded-modules

      # ── Configure AWS via OIDC (pas de clés statiques) ────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-3
          role-session-name: terraform-plan-${{ github.run_id }}

      # ── Terraform Init ────────────────────────────────────────────────────
      - name: Terraform Init
        id: init
        working-directory: envs/dev
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="kms_key_id=${{ secrets.TF_STATE_KMS_KEY_ARN }}" \
            -backend-config="key=envs/dev/terraform.tfstate" \
            -backend-config="region=eu-west-3" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true" \
            -input=false

      # ── Terraform Validate ────────────────────────────────────────────────
      - name: Terraform Validate
        id: validate
        working-directory: envs/dev
        run: terraform validate -no-color

      # ── Terraform Plan ────────────────────────────────────────────────────
      - name: Terraform Plan
        id: plan
        working-directory: envs/dev
        run: |
          terraform plan \
            -var-file=terraform.tfvars.example \
            -no-color \
            -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      # ── Commentaire PR ────────────────────────────────────────────────────
      - name: Comment PR with plan results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.existsSync('envs/dev/plan_output.txt')
              ? fs.readFileSync('envs/dev/plan_output.txt', 'utf8')
              : 'Plan output not available';

            const truncated = planOutput.length > 65000
              ? planOutput.substring(0, 65000) + '\n\n... [output truncated]'
              : planOutput;

            const initOutcome = '${{ steps.init.outcome }}';
            const validateOutcome = '${{ steps.validate.outcome }}';
            const planOutcome = '${{ steps.plan.outcome }}';

            const body = `## Terraform Plan Results

            | Step | Status |
            |------|--------|
            | Init | ${initOutcome === 'success' ? '✅' : '❌'} ${initOutcome} |
            | Validate | ${validateOutcome === 'success' ? '✅' : '❌'} ${validateOutcome} |
            | Plan | ${planOutcome === 'success' ? '✅' : '❌'} ${planOutcome} |

            <details><summary>Show Plan Output</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      # ── Fail si plan a échoué ─────────────────────────────────────────────
      - name: Check plan status
        if: steps.plan.outcome == 'failure'
        run: exit 1
